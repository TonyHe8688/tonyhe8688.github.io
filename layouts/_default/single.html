{{ define "main" }}
<article class="article">
  <header class="article-header">
    <p class="eyebrow">{{ .Section | humanize }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="lede">{{ . }}</p>{{ end }}
  </header>

  <div class="article-body">
    {{ .Content }}
  </div>

  {{ with .Params.avontek_url }}
  <aside class="related-link">
    <h2>Related Implementation</h2>
    <p><a href="{{ . }}" rel="noopener">Avontek embedded systems reference</a></p>
  </aside>
  {{ end }}
</article>
{{ end }}
